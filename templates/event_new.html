<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Create Event</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <style>
    body { background: #f4f6f9; }
    .hero {
      background: linear-gradient(135deg, #0d9488 0%, #0f766e 100%);
      color: #fff;
      padding: 1rem;
      text-align: center;
      border-radius: 0 0 1.5rem 1.5rem;
      margin-bottom: 2rem;
    }
    .card { border-radius: 1rem; border: none; box-shadow: 0 4px 18px rgba(0,0,0,.1); }
  </style>
</head>
<body>
  <div class="hero">
    <h2>Create New Event</h2>
    <p><a href="{{ url_for('index') }}" class="text-white text-decoration-none">&larr; Back to Dashboard</a></p>
  </div>
  
  <div class="container pb-5" style="max-width: 600px;">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for cat, msg in messages %}
          <div class="alert alert-{{ 'danger' if cat == 'error' else cat }} alert-dismissible fade show">
            {{ msg }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <div class="card p-4">
      <form action="{{ url_for('new_event') }}" method="POST" enctype="multipart/form-data">
        <div class="mb-3">
          <label class="form-label">Event Name</label>
          <input type="text" class="form-control" name="event_name" required placeholder="e.g., Swiss Open 2026">
        </div>
        <div class="mb-4">
          <label class="form-label">Registrations PDF/HTML</label>
          <input type="file" class="form-control" name="registrations" accept=".pdf,.html,.htm,text/html,application/pdf" required>
          <div class="form-text">Upload the file containing all fighters. They will be saved to this event permanently.</div>
        </div>
        <button type="submit" class="btn w-100 py-2 text-white fw-bold" style="background:#0d9488;">Create Event & Parse Fighters</button>
      </form>
    </div>
  </div>
</body>
</html>
