<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ event.name }} - Schedule generator</title>
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <style>
    body { background: #f4f6f9; }
    .hero { background: linear-gradient(135deg, #0d9488 0%, #0f766e 100%); color: #fff; padding: 2rem 1rem; text-align: center; margin-bottom: 2rem; }
    .card { border-radius: 1rem; border: none; box-shadow: 0 4px 18px rgba(0,0,0,.1); max-width: 600px; margin: 0 auto; }
  </style>
</head>
<body>
  <div class="hero">
    <h2>{{ event.name }}</h2>
    <p class="opacity-75 mb-0">Generate your team's custom schedule</p>
  </div>
  
  <div class="container pb-5">
    <div style="max-width: 600px; margin: 0 auto;" class="d-flex gap-2 mb-3">
      <a href="{{ url_for('index') }}" class="btn btn-outline-secondary btn-sm">&larr; Dashboard</a>
      <a href="{{ url_for('event_admin', event_id=event.id) }}" class="btn btn-outline-secondary btn-sm">Admin &rarr;</a>
    </div>

    {% if not event.days %}
      <div class="text-center text-muted mt-5">
        <p>No schedules have been published for this event yet.</p>
      </div>
    {% else %}
    <div class="card p-4">
      <form id="filterForm" method="GET">
        <div class="mb-3">
          <label class="form-label">Select Day / Schedule</label>
          <select id="daySelect" class="form-select" required>
            <option value="" disabled {% if not request.args.get('day_id') %}selected{% endif %}>Choose a schedule...</option>
            {% for day in event.days %}
              <option value="{{ day.id }}" {% if request.args.get('day_id') == day.id %}selected{% endif %}>{{ day.name }} ({{ day.type }})</option>
            {% endfor %}
          </select>
        </div>
        
        <div class="mb-3">
          <label class="form-label">Country Filter (Abbreviation or Name)</label>
          <input type="text" class="form-control" name="country" placeholder="e.g. SUI, AUT, Switzerland">
          <div class="form-text">Leave blank to show all countries.</div>
        </div>
        
        <div class="mb-4">
          <label class="form-label">Club Filter (Optional)</label>
          <input type="text" class="form-control" name="club" placeholder="e.g. Kenseikan">
          <div class="form-text">Leave blank to show all clubs in the selected country.</div>
        </div>
        
        <div class="mb-4" id="medalsToggleContainer" style="display: none;">
          <div class="form-check form-switch">
            <input class="form-check-input" type="checkbox" id="medalsOnlySwitch" name="medals_only" value="1" checked>
            <label class="form-check-label" for="medalsOnlySwitch">Only fighters who won at least 1 fight (Top 3 Medals)</label>
          </div>
        </div>
        
        <button type="submit" class="btn w-100 text-white fw-bold py-2" style="background:#0d9488;">Generate Schedule</button>
      </form>
    </div>
    {% endif %}
  </div>
  
  <script>
    const form = document.getElementById('filterForm');
    const daySelect = document.getElementById('daySelect');
    const medalsContainer = document.getElementById('medalsToggleContainer');
    
    // Day types mapped by option value
    const dayTypes = {
      {% for day in event.days %}
      "{{ day.id }}": "{{ day.type }}",
      {% endfor %}
    };

    if (daySelect) {
      daySelect.addEventListener('change', function() {
        const type = dayTypes[this.value];
        if (type === 'results') {
          medalsContainer.style.display = 'block';
        } else {
          medalsContainer.style.display = 'none';
        }
      });
      // Trigger change on load if something is already selected
      if (daySelect.value) {
        daySelect.dispatchEvent(new Event('change'));
      }
    }
    
    if(form) {
      form.addEventListener('submit', function(e) {
        e.preventDefault();
        const dayId = daySelect.value;
        const country = form.elements['country'].value;
        const club = form.elements['club'].value;
        
        // Build the URL manually to match the Flask route
        let url = "{{ url_for('event_public', event_id=event.id) }}/day/" + dayId;
        
        const params = new URLSearchParams();
        if(country) params.append('country', country);
        if(club) params.append('club', club);
        
        const type = dayTypes[dayId];
        if (type === 'results') {
          const medalsOnly = document.getElementById('medalsOnlySwitch').checked;
          if (medalsOnly) {
            params.append('medals_only', '1');
          } else {
            params.append('medals_only', '0');
          }
        }
        
        const qs = params.toString();
        if(qs) {
          url += '?' + qs;
        }
        
        window.location.href = url;
      });
    }
  </script>
</body>
</html>
